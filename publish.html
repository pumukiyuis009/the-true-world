<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Publish | THE TRUE WORLD</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<canvas id="particles"></canvas>

<section class="publish">
<h2>Add Your Voice to the Silence</h2>

<form id="theoryForm">
<input type="text" id="title" placeholder="Theory title" maxlength="100" required>
<select id="category">
<option>Paranormal</option>
<option>Cosmos</option>
<option>Consciousness</option>
<option>Conspiracies</option>
<option>Science</option>
<option>Philosophy</option>
</select>
<textarea id="content" placeholder="Write your theory..." required></textarea>
<input type="text" id="author" placeholder="Alias (optional)">
<button type="submit" class="cta">Transmit to the Void</button>
</form>

</section>

<script src="js/main.js"></script>
</body>
</html>
