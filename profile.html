<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile | THE TRUE WORLD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Orbitron&family=Cinzel&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <div class="logo-container" onclick="goHome()" title="THE TRUE WORLD - Home">
    <img src="logo.png" alt="The True World Logo" class="logo-img" />
    <h1>THE TRUE WORLD</h1>
  </div>
  <nav class="navbar">
    <input type="text" placeholder="Search theories..." />
    <button class="void-btn" onclick="showLogin()">Enter the Void</button>
  </nav>
</header>

<main class="container profile-wrapper">

  <div class="profile-card glass">

    <div class="avatar-container">
      <img id="avatarPreview" class="avatar-large" title="Click to change your profile picture" />
      <div class="avatar-overlay">Change</div>
      <input type="file" id="avatarInput" accept="image/png, image/jpeg" />
    </div>

    <h2 id="profileName"></h2>

    <div class="profile-stats">
      <div><span id="followers">0</span><p>Followers</p></div>
      <div><span id="following">0</span><p>Following</p></div>
      <div><span id="likes">0</span><p>Likes</p></div>
      <div><span id="theoryCount">0</span><p>Theories</p></div>
    </div>

    <section class="profile-theories">
      <h3>Your Theories</h3>
      <div id="userTheories" class="card-grid"></div>
    </section>

  </div>

</main>

<script src="js/main.js"></script>
</body>
</html>
